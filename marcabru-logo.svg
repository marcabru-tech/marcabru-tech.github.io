<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="#050816" stroke="#00f5ff" stroke-width="2"/>

  <!-- Outer circuit ring segments -->
  <circle cx="100" cy="100" r="82" fill="none" stroke="#00f5ff" stroke-width="1" stroke-dasharray="12 8" opacity="0.4"/>

  <!-- Inner decorative hexagon outline -->
  <polygon points="100,30 160,65 160,135 100,170 40,135 40,65"
           fill="none" stroke="#7c3aed" stroke-width="1.5" opacity="0.6"/>

  <!-- Circuit nodes -->
  <circle cx="100" cy="30"  r="3" fill="#00f5ff"/>
  <circle cx="160" cy="65"  r="3" fill="#00f5ff"/>
  <circle cx="160" cy="135" r="3" fill="#7c3aed"/>
  <circle cx="100" cy="170" r="3" fill="#7c3aed"/>
  <circle cx="40"  cy="135" r="3" fill="#00f5ff"/>
  <circle cx="40"  cy="65"  r="3" fill="#00f5ff"/>

  <!-- AI brain lines -->
  <line x1="100" y1="30"  x2="100" y2="55"  stroke="#00f5ff" stroke-width="1" opacity="0.5"/>
  <line x1="160" y1="65"  x2="140" y2="75"  stroke="#00f5ff" stroke-width="1" opacity="0.5"/>
  <line x1="160" y1="135" x2="140" y2="125" stroke="#7c3aed" stroke-width="1" opacity="0.5"/>
  <line x1="100" y1="170" x2="100" y2="145" stroke="#7c3aed" stroke-width="1" opacity="0.5"/>
  <line x1="40"  y1="135" x2="60"  y2="125" stroke="#00f5ff" stroke-width="1" opacity="0.5"/>
  <line x1="40"  y1="65"  x2="60"  y2="75"  stroke="#00f5ff" stroke-width="1" opacity="0.5"/>

  <!-- Center glow circle -->
  <circle cx="100" cy="100" r="42" fill="none" stroke="#0080ff" stroke-width="1" opacity="0.5"/>

  <!-- "MT" monogram -->
  <text x="100" y="88"
        font-family="'JetBrains Mono', monospace, sans-serif"
        font-size="20"
        font-weight="700"
        fill="url(#grad)"
        text-anchor="middle"
        letter-spacing="2">MARCABRU</text>
  <text x="100" y="114"
        font-family="'JetBrains Mono', monospace, sans-serif"
        font-size="14"
        font-weight="400"
        fill="#00f5ff"
        text-anchor="middle"
        letter-spacing="4"
        opacity="0.85">TECH</text>

  <!-- Decorative dots -->
  <circle cx="100" cy="130" r="2" fill="#00f5ff" opacity="0.6"/>
  <circle cx="90"  cy="130" r="2" fill="#7c3aed" opacity="0.6"/>
  <circle cx="110" cy="130" r="2" fill="#7c3aed" opacity="0.6"/>

  <!-- Gradient definition -->
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#00f5ff"/>
      <stop offset="50%"  stop-color="#0080ff"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>
</svg>
